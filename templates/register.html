<!DOCTYPE html>
<html>

<head>
  <title>Rekisteröinti</title>
  <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>
  <div class="container">
  <h1>Luo tunnus</h1>
  <form action="/create" method="post" class=register-form>
    <p>
      <label for="name">Käyttäjätunnus:</label>
      <input id="name" type="text" name="username" />
    </p>
    <p>
      <label for="pass">Salasana:</label>
      <input id="pass" type="password" name="password1" />
    </p>
    <p>
      <label for="passpass">Toista salasana:</label>
      <input id=passpass type="password" name="password2" />
    </p>
    <input type="submit" value="Luo tunnus" />
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  </form>
  <p>
    <a href="/">Palaa etusivulle</a>
  </p>
  </div>
</body>

</html>
