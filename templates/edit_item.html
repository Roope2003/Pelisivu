<!DOCTYPE html>
<html>
<head>
  <title>Muokkaa peliä</title>
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container">
  <h1>Muokkaa peliä</h1>

  <form action="/update_item/{{ item.id }}" method="post">
    <p>
      <label for="title">Otsikko</label>
      <input type="text" name="title" value="{{ item.title }}" id="title">
    </p>

    <p>
      <label for="desc">Kuvaus</label>
      <textarea id="desc" name="content" rows="5" cols="40">{{ item.content }} </textarea>
    </p>

    <p>
      <label for="hinta">Hinta</label>
      <input type="number" name="price" step="0.01" value="{{ item.price }}" id="hinta">
    </p>

    <p>
      Genre: <br>
      <label for="genre">Genre</label>
      <select name="genre" id="genre" multiple size="6">
        <option value="Toiminta" {% if item.genre == "Toiminta" %}selected{% endif %}>Toiminta</option>
        <option value="Seikkailu" {% if item.genre == "Seikkailu" %}selected{% endif %}>Seikkailu</option>
        <option value="RPG" {% if item.genre == "RPG" %}selected{% endif %}>RPG</option>
        <option value="Strategia" {% if item.genre == "Strategia" %}selected{% endif %}>Strategia</option>
        <option value="Simulaatio" {% if item.genre == "Simulaatio" %}selected{% endif %}>Simulaatio</option>
        <option value="Muu" {% if item.genre == "Muu" %}selected{% endif %}>Muu</option>
      </select>
    </p>
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="id" value="{{ item.id }}">
    <input type="submit" value="Tallenna muutokset">
  </form>
  </div>
</body>
</html>
