<!DOCTYPE html>
<html>
<head>
  <title>Muokkaa antamaasi arviota</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
    <h1>Muokkaa antamaasi arviota</h1>
    <form action="/edit_rating/{{ rating.id }}" method="post">
        <label>Arvio (1-5): 
            <select name="rating" required>
                <option value="1" {% if rating.rating == 1 %}selected{% endif %}>1</option>
                <option value="2" {% if rating.rating == 2 %}selected{% endif %}>2</option>
                <option value="3" {% if rating.rating == 3 %}selected{% endif %}>3</option>
                <option value="4" {% if rating.rating == 4 %}selected{% endif %}>4</option>
                <option value="5" {% if rating.rating == 5 %}selected{% endif %}>5</option>
            </select>
        </label><br>
        <label>Kommentti: 
            <textarea name="comment" rows="3">{{ rating.comment }}</textarea>
        </label><br>
        <input type="submit" value="Päivitä arvio">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    </form>
    <a href="/">Takaisin</a>
    </div>
</body>
</html>
